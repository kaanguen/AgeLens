<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="AgeLens - Predict Age, Gender, and Race" />
    <title>AgeLens</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed-variant": "#0038b6",
                    "on-error-container": "#ffdad6",
                    "surface-container-low": "#191c1e",
                    "on-secondary-fixed-variant": "#45474a",
                    "surface-container-high": "#272a2c",
                    "on-tertiary-fixed": "#171c24",
                    "tertiary-fixed-dim": "#c2c6d2",
                    "inverse-surface": "#e0e3e5",
                    "outline": "#8d90a2",
                    "primary": "#b7c4ff",
                    "on-primary-fixed": "#001452",
                    "secondary-fixed": "#e2e2e6",
                    "on-error": "#690005",
                    "surface-tint": "#b7c4ff",
                    "secondary-fixed-dim": "#c6c6ca",
                    "primary-container": "#0052ff",
                    "error": "#ffb4ab",
                    "on-secondary": "#2f3034",
                    "on-tertiary": "#2c3139",
                    "tertiary-fixed": "#dee2ee",
                    "surface-bright": "#363a3b",
                    "secondary": "#c6c6ca",
                    "inverse-on-surface": "#2d3133",
                    "on-background": "#e0e3e5",
                    "inverse-primary": "#004ced",
                    "on-secondary-fixed": "#1a1c1f",
                    "outline-variant": "#434656",
                    "on-surface": "#e0e3e5",
                    "secondary-container": "#4a4b4f",
                    "error-container": "#93000a",
                    "background": "#101415",
                    "on-primary-container": "#dfe3ff",
                    "surface-container-lowest": "#0b0f10",
                    "surface-container": "#1d2022",
                    "surface": "#101415",
                    "on-primary": "#002682",
                    "primary-fixed": "#dde1ff",
                    "tertiary": "#c2c6d2",
                    "on-tertiary-fixed-variant": "#424750",
                    "on-tertiary-container": "#e0e4f0",
                    "on-secondary-container": "#bbbbbf",
                    "surface-container-highest": "#323537"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "8px",
                    "gutter": "16px",
                    "stack-sm": "4px",
                    "container-padding-desktop": "32px",
                    "container-padding-mobile": "16px",
                    "stack-md": "12px",
                    "stack-lg": "24px"
            },
            "fontFamily": {
                    "headline-lg": ["Hanken Grotesk"],
                    "headline-md": ["Hanken Grotesk"],
                    "data-mono": ["JetBrains Mono"],
                    "label-caps": ["Hanken Grotesk"],
                    "body-sm": ["Hanken Grotesk"],
                    "body-lg": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "data-mono": ["13px", {"lineHeight": "18px", "fontWeight": "500"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
    <style>
        .scanning-line {
            position: absolute;
            height: 2px;
            width: 100%;
            background: #b7c4ff;
            box-shadow: 0 0 15px 2px rgba(183, 196, 255, 0.8);
            top: 0;
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }
        .shutter-ring {
            border: 4px solid #b7c4ff;
            padding: 4px;
        }
    </style>
  </head>
  <body class="bg-background text-on-background font-body-lg min-h-screen selection:bg-primary selection:text-on-primary">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
